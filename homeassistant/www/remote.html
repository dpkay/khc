<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/local/manifest.json">
<meta name="theme-color" content="#0d0d0d">
<title>Kaeser-Chen Home Control</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --surface2: #252525;
    --border: #333;
    --text: #e0e0e0;
    --text-dim: #888;
    --accent: #4a9eff;
    --accent-dim: #2a6ecc;
    --danger: #e05555;
    --success: #4caf50;
    --warning: #ff9800;
    --radius: 12px;
    --radius-sm: 8px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ---- Auth overlay ---- */
  #auth-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  #auth-overlay.hidden { display: none; }
  #auth-box {
    width: 100%; max-width: 400px;
    display: flex; flex-direction: column; gap: 16px;
  }
  #auth-box h2 { text-align: center; font-weight: 500; }
  #auth-box input {
    width: 100%; padding: 14px 16px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-size: 15px; outline: none;
  }
  #auth-box input:focus { border-color: var(--accent); }
  #auth-box button {
    padding: 14px; background: var(--accent); border: none;
    border-radius: var(--radius-sm); color: #fff; font-size: 16px;
    font-weight: 600; cursor: pointer;
  }
  #auth-error { color: var(--danger); text-align: center; font-size: 14px; min-height: 20px; }

  /* ---- Status bar ---- */
  #status-bar {
    padding: 6px 16px;
    font-size: 12px;
    text-align: center;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  #status-bar.connected { color: var(--success); }
  #status-bar.error { color: var(--danger); }

  /* ---- Tab bar ---- */
  .tab-bar {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--surface);
  }
  .tab-bar button {
    flex: 1; padding: 14px 0;
    background: none; border: none; border-bottom: 2px solid transparent;
    color: var(--text-dim); font-size: 15px; font-weight: 500;
    cursor: pointer; transition: color 0.15s, border-color 0.15s;
  }
  .tab-bar button.active {
    color: var(--accent); border-bottom-color: var(--accent);
  }

  /* ---- Tab content ---- */
  .tab-content {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 16px;
    -webkit-overflow-scrolling: touch;
  }
  .tab-page { display: none; }
  .tab-page.active { display: block; }

  /* ---- Buttons ---- */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-size: 14px; font-weight: 500;
    cursor: pointer; transition: background 0.1s, transform 0.05s;
    -webkit-user-select: none; user-select: none;
    min-height: 48px; padding: 8px 12px;
    text-align: center; line-height: 1.2;
  }
  .btn:active { background: var(--border); transform: scale(0.96); }
  .btn.danger { color: var(--danger); }
  .btn.accent { background: var(--accent-dim); border-color: var(--accent); color: #fff; }
  .btn.small { min-height: 40px; font-size: 13px; padding: 6px 10px; }
  .btn.flash { animation: flash-confirm 0.3s ease; }
  @keyframes flash-confirm {
    0% { background: var(--accent); }
    100% { background: var(--surface2); }
  }

  /* ---- Shield tab ---- */
  .section { margin-bottom: 20px; }
  .section-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-dim); margin-bottom: 8px;
  }

  .media-row {
    display: flex; gap: 10px; justify-content: center;
  }
  .media-row .btn { flex: 1; max-width: 100px; min-height: 52px; font-size: 20px; }

  .dpad {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: auto auto auto;
    gap: 8px;
    max-width: 240px;
    margin: 0 auto;
  }
  .dpad .btn { min-height: 56px; font-size: 18px; }
  .dpad .btn.center-btn {
    background: var(--accent-dim); border-color: var(--accent);
    border-radius: 50%; width: 64px; height: 64px;
    justify-self: center; align-self: center;
    min-height: unset;
  }
  .dpad .btn.center-btn:active { background: var(--accent); }

  .nav-row {
    display: flex; gap: 10px; justify-content: center;
  }
  .nav-row .btn { flex: 1; max-width: 150px; min-height: 48px; }

  .volume-section {
    display: flex; align-items: center; gap: 12px; padding: 0 4px;
  }
  .volume-section .vol-label { font-size: 20px; flex-shrink: 0; }
  .volume-section input[type="range"] {
    flex: 1; height: 36px;
    -webkit-appearance: none; appearance: none;
    background: transparent; cursor: pointer;
  }
  .volume-section input[type="range"]::-webkit-slider-runnable-track {
    height: 6px; background: var(--border); border-radius: 3px;
  }
  .volume-section input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--accent); margin-top: -11px;
  }
  .volume-pct { font-size: 13px; color: var(--text-dim); min-width: 36px; text-align: right; }

  .controls-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  .apps-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
  }

  .reboot-row {
    margin-top: 8px;
    display: flex; justify-content: center;
  }
  .reboot-row .btn {
    font-size: 12px; color: var(--text-dim); border-color: transparent;
    background: transparent; min-height: 36px;
  }
  .reboot-row .btn:active { color: var(--danger); }

  /* ---- Lights tab ---- */
  .lights-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .lights-grid .btn { min-height: 64px; font-size: 15px; }
  .lights-grid .btn.wide { grid-column: span 1; }

  /* ---- Shades tab ---- */
  .shade-room { margin-bottom: 24px; }
  .shade-room h3 {
    font-size: 15px; font-weight: 600; margin-bottom: 10px;
    color: var(--text);
  }
  .shade-group {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    margin-bottom: 10px;
  }
  .shade-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px;
  }
  .shade-card .shade-name {
    font-size: 12px; color: var(--text-dim); text-align: center;
    margin-bottom: 8px;
  }
  .shade-card .shade-btns {
    display: flex; gap: 6px;
  }
  .shade-card .shade-btns .btn { flex: 1; min-height: 42px; font-size: 16px; }

  .shade-all-row {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
  }
  .shade-all-row .btn { min-height: 44px; font-size: 13px; }

  /* Divider */
  .divider {
    height: 1px; background: var(--border); margin: 4px 0;
  }

  /* Landscape / wider screens */
  @media (min-width: 481px) {
    .lights-grid { grid-template-columns: 1fr 1fr 1fr; }
    .shade-group { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
  }
</style>
</head>

<script>
// ---- PWA Service Worker ----
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/local/sw.js', { scope: '/local/' })
    .then(r => console.log('SW registered', r.scope))
    .catch(e => console.error('SW failed', e));
}

// ---- State ----
let ws = null;
let msgId = 1;
let token = localStorage.getItem('ha_token') || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJmMjg5NDdlMTcxZWY0NWQ5YjQ2M2MyM2Y2ZjIyNDAyYyIsImlhdCI6MTc3NDgwMzA3NSwiZXhwIjoyMDkwMTYzMDc1fQ.on1Fj6XtY-5IZwk8WU9odT7D5bYrXrfOwh8hcWyDqnc';
let volumeSubId = null;
let volumeDebounce = null;
let pendingCallbacks = {};

const DENON_ENTITY = 'media_player.denon_avr_x4700h';
const NUMPAD_TOPIC = 'khc/livingroom/numpad';
const SHIELD_KEY_TOPIC = 'kha/livingroom/shield/press_key';

// ---- Auth ----
function saveToken() {
  const input = document.getElementById('token-input');
  token = input.value.trim();
  if (!token) { document.getElementById('auth-error').textContent = 'Token required'; return; }
  localStorage.setItem('ha_token', token);
  document.getElementById('auth-error').textContent = '';
  connect();
}

function showAuth(msg) {
  document.getElementById('auth-overlay').classList.remove('hidden');
  document.getElementById('auth-error').textContent = msg || '';
  document.getElementById('token-input').value = token;
}

// ---- WebSocket ----
function connect() {
  if (ws) { try { ws.close(); } catch(e){} }

  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = proto + '//' + location.host + '/api/websocket';
  setStatus('Connecting...', '');

  ws = new WebSocket(url);

  ws.onopen = function() {
    setStatus('Authenticating...', '');
  };

  ws.onmessage = function(evt) {
    const msg = JSON.parse(evt.data);

    if (msg.type === 'auth_required') {
      ws.send(JSON.stringify({ type: 'auth', access_token: token }));
      return;
    }

    if (msg.type === 'auth_ok') {
      document.getElementById('auth-overlay').classList.add('hidden');
      setStatus('Connected', 'connected');
      subscribeVolume();
      fetchVolume();
      return;
    }

    if (msg.type === 'auth_invalid') {
      localStorage.removeItem('ha_token');
      token = '';
      showAuth('Invalid token');
      ws.close();
      return;
    }

    // Handle state change events (volume subscription)
    if (msg.type === 'event' && msg.id === volumeSubId) {
      const data = msg.event && msg.event.data;
      if (data && data.entity_id === DENON_ENTITY && data.new_state) {
        updateVolumeFromState(data.new_state);
      }
      return;
    }

    // Handle result callbacks
    if (msg.id && pendingCallbacks[msg.id]) {
      pendingCallbacks[msg.id](msg);
      delete pendingCallbacks[msg.id];
    }
  };

  ws.onclose = function() {
    setStatus('Disconnected. Reconnecting...', 'error');
    setTimeout(connect, 3000);
  };

  ws.onerror = function() {
    setStatus('Connection error', 'error');
  };
}

function setStatus(text, cls) {
  const el = document.getElementById('status-bar');
  el.textContent = text;
  el.className = cls || '';
}

function sendMsg(msg, cb) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  msg.id = msgId++;
  if (cb) pendingCallbacks[msg.id] = cb;
  ws.send(JSON.stringify(msg));
  return msg.id;
}

// ---- Volume ----
function subscribeVolume() {
  volumeSubId = msgId;
  sendMsg({
    type: 'subscribe_events',
    event_type: 'state_changed'
  });
}

function fetchVolume() {
  sendMsg({
    type: 'call_service',
    domain: 'homeassistant',
    service: 'update_entity',
    target: { entity_id: DENON_ENTITY },
    service_data: {}
  });
  // Also fetch current state directly
  sendMsg({
    type: 'get_states'
  }, function(msg) {
    if (msg.result) {
      const entity = msg.result.find(function(e) { return e.entity_id === DENON_ENTITY; });
      if (entity) updateVolumeFromState(entity);
    }
  });
}

function updateVolumeFromState(state) {
  const vol = state.attributes && state.attributes.volume_level;
  if (vol != null) {
    const pct = Math.round(vol * 100);
    const slider = document.getElementById('volume-slider');
    slider.value = pct;
    document.getElementById('volume-pct').textContent = pct + '%';
  }
}

function onVolumeSlide(val) {
  document.getElementById('volume-pct').textContent = val + '%';
}

function onVolumeSet(val) {
  clearTimeout(volumeDebounce);
  volumeDebounce = setTimeout(function() {
    const vol = parseInt(val) / 100;
    sendMsg({
      type: 'call_service',
      domain: 'media_player',
      service: 'volume_set',
      target: { entity_id: DENON_ENTITY },
      service_data: { volume_level: vol }
    });
  }, 100);
}

// ---- Shield nav keys (MQTT direct to Shield service) ----
function shieldKey(name) {
  flashButton(event.currentTarget);
  sendMsg({
    type: 'call_service',
    domain: 'mqtt',
    service: 'publish',
    service_data: {
      topic: SHIELD_KEY_TOPIC,
      payload: JSON.stringify({ name: name })
    }
  });
}

// ---- Numpad MQTT (for actions handled by main.py) ----
function numpadKey(modifier, key) {
  flashButton(event.currentTarget);
  const payload = {
    event_name: 'pressed',
    key: key,
    pressed_keys: modifier ? [modifier, key] : [key]
  };
  sendMsg({
    type: 'call_service',
    domain: 'mqtt',
    service: 'publish',
    service_data: {
      topic: NUMPAD_TOPIC,
      payload: JSON.stringify(payload)
    }
  });
}

// ---- Light scenes (numpad with mod_right) ----
function lightScene(key) {
  flashButton(event.currentTarget);
  numpadKey('mod_right', key);
}

// ---- Shades (call script.send_somfy_shade_command) ----
function shade(names, command) {
  flashButton(event.currentTarget);
  sendMsg({
    type: 'call_service',
    domain: 'script',
    service: 'send_somfy_shade_command',
    service_data: {
      shade_names: names,
      command: command
    }
  });
}

// ---- Shield reboot (double-tap confirm) ----
let rebootPending = false;
function confirmReboot(btn) {
  if (rebootPending) {
    rebootPending = false;
    btn.textContent = 'Reboot Shield';
    btn.style.color = '';
    numpadKey('mod_left', '1_3');
  } else {
    rebootPending = true;
    btn.textContent = 'Tap again to confirm';
    btn.style.color = 'var(--danger)';
    setTimeout(function() {
      rebootPending = false;
      btn.textContent = 'Reboot Shield';
      btn.style.color = '';
    }, 3000);
  }
}

// ---- Tab switching ----
function switchTab(name) {
  document.querySelectorAll('.tab-page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.tab-bar button').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('tab-' + name).classList.add('active');
  // Activate the clicked tab button
  var btns = document.querySelectorAll('.tab-bar button');
  var tabNames = ['shield', 'lights', 'shades'];
  var idx = tabNames.indexOf(name);
  if (idx >= 0) btns[idx].classList.add('active');
}

// ---- Visual feedback ----
function flashButton(el) {
  if (!el) return;
  el.classList.remove('flash');
  void el.offsetWidth; // force reflow
  el.classList.add('flash');
}

// ---- Init ----
if (token) {
  document.getElementById('auth-overlay').classList.add('hidden');
  connect();
} else {
  showAuth();
}
</script>
